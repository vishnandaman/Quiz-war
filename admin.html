<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center - Agent Skill War</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--bg2:#0f0f2a;--cyan:#00f0ff;--magenta:#ff0080;--purple:#8b5cf6;
  --gold:#ffd700;--green:#00ff64;
  --glass:rgba(15,15,42,0.85);--glass-border:rgba(0,240,255,0.15);
}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:#e0e0ff;min-height:100vh;padding:20px}
body::before{
  content:'';position:fixed;inset:0;z-index:0;opacity:0.05;
  background-image:
    linear-gradient(30deg,var(--cyan) 12%,transparent 12.5%,transparent 87%,var(--cyan) 87.5%),
    linear-gradient(150deg,var(--cyan) 12%,transparent 12.5%,transparent 87%,var(--cyan) 87.5%),
    linear-gradient(30deg,var(--cyan) 12%,transparent 12.5%,transparent 87%,var(--cyan) 87.5%),
    linear-gradient(150deg,var(--cyan) 12%,transparent 12.5%,transparent 87%,var(--cyan) 87.5%),
    linear-gradient(60deg,rgba(139,92,246,0.3) 25%,transparent 25.5%,transparent 75%,rgba(139,92,246,0.3) 75%),
    linear-gradient(60deg,rgba(139,92,246,0.3) 25%,transparent 25.5%,transparent 75%,rgba(139,92,246,0.3) 75%);
  background-size:80px 140px;
  background-position:0 0,0 0,40px 70px,40px 70px,0 0,40px 70px;
}
.container{position:relative;z-index:2;max-width:900px;margin:0 auto}

.conn-status{
  position:fixed;top:12px;right:12px;z-index:50;display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;font-size:0.65rem;
  font-family:'Orbitron',monospace;letter-spacing:1px;
  background:var(--glass);border:1px solid var(--glass-border);
}
.conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conn-dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:connPulse 2s infinite}
.conn-dot.local{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.conn-dot.loading{background:var(--purple);box-shadow:0 0 8px var(--purple);animation:connPulse 1s infinite}
.sync-label{font-size:0.6rem;margin-left:4px;letter-spacing:0.5px}
.sync-label.saving{color:var(--gold)}
.sync-label.saved{color:var(--green)}
.sync-label.error{color:var(--magenta)}
@keyframes connPulse{0%,100%{opacity:1}50%{opacity:0.4}}

.admin-header{text-align:center;padding:20px 0 30px}
.admin-tag{
  display:inline-block;padding:4px 16px;margin-bottom:8px;
  background:rgba(255,0,80,0.1);border:1px solid rgba(255,0,80,0.3);
  border-radius:20px;font-family:'Orbitron',monospace;font-size:0.65rem;
  color:var(--magenta);letter-spacing:3px;text-transform:uppercase;
}
.admin-title{
  font-family:'Orbitron',monospace;font-size:clamp(1.5rem,4vw,2.2rem);font-weight:900;
  background:linear-gradient(135deg,var(--magenta),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ═══ AUTH ═══ */
#authScreen{text-align:center;padding:60px 0}
#authScreen input{
  padding:14px 18px;width:280px;max-width:90%;background:rgba(255,0,80,0.05);
  border:1px solid rgba(255,0,80,0.3);border-radius:8px;
  color:#e0e0ff;font-family:'Rajdhani',sans-serif;font-size:1.1rem;
  outline:none;text-align:center;
}
#authScreen input:focus{border-color:var(--magenta);box-shadow:0 0 15px rgba(255,0,80,0.2)}
#authScreen input::placeholder{color:rgba(224,224,255,0.3)}
#authScreen button{
  display:block;margin:16px auto 0;padding:12px 36px;
  font-family:'Orbitron',monospace;font-size:0.85rem;font-weight:700;
  border:1px solid var(--magenta);background:rgba(255,0,80,0.1);
  color:var(--magenta);cursor:pointer;border-radius:8px;
  text-transform:uppercase;letter-spacing:2px;transition:all 0.3s;
}
#authScreen button:hover:not(:disabled){background:rgba(255,0,80,0.2);box-shadow:0 0 20px rgba(255,0,80,0.3)}
#authScreen button:disabled,#authScreen input:disabled{opacity:0.45;cursor:not-allowed}
.auth-hint{font-size:0.8rem;color:rgba(224,224,255,0.3);margin-top:12px}
.auth-hint.error{color:var(--magenta)}

#adminPanel{display:none}

.panel{
  background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;
  padding:24px;margin-bottom:20px;
}
.panel-title{
  font-family:'Orbitron',monospace;font-size:0.9rem;font-weight:700;
  color:var(--cyan);letter-spacing:2px;margin-bottom:16px;
  padding-bottom:8px;border-bottom:1px solid rgba(0,240,255,0.1);
}

/* ─── STATS ─── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.stat-card{
  background:rgba(0,240,255,0.04);border:1px solid rgba(0,240,255,0.1);
  border-radius:10px;padding:16px;text-align:center;
}
.stat-value{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;color:var(--cyan)}
.stat-label{font-size:0.8rem;color:rgba(224,224,255,0.4);margin-top:4px}
.stat-value.active-name{font-size:0.85rem;color:var(--green);word-break:break-word}

/* ─── TEAM CONTROL LIST ─── */
.team-ctrl{
  display:flex;align-items:center;gap:16px;
  padding:14px 16px;margin-bottom:8px;border-radius:10px;
  background:rgba(0,240,255,0.02);border:1px solid rgba(0,240,255,0.06);
  transition:all 0.3s;
}
.team-ctrl.is-active{
  border-color:rgba(0,255,100,0.3);background:rgba(0,255,100,0.04);
  box-shadow:0 0 15px rgba(0,255,100,0.08);
}

.tc-num{
  font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;
  color:rgba(224,224,255,0.2);min-width:30px;text-align:center;
}
.team-ctrl.is-active .tc-num{color:var(--green)}

.tc-info{flex:1;min-width:0}
.tc-agent{font-family:'Orbitron',monospace;font-size:0.85rem;font-weight:700;color:var(--cyan)}
.tc-presenter{font-size:0.78rem;color:rgba(224,224,255,0.35)}
.tc-stats{font-size:0.75rem;color:rgba(224,224,255,0.3);margin-top:2px}
.tc-stats span{color:var(--gold);font-weight:600}

.tc-status{
  font-family:'Orbitron',monospace;font-size:0.6rem;font-weight:700;
  padding:4px 10px;border-radius:4px;letter-spacing:1.5px;min-width:65px;text-align:center;
}
.tc-status.st-active{background:rgba(0,255,100,0.15);color:var(--green);border:1px solid rgba(0,255,100,0.3);animation:stPulse 1.5s infinite alternate}
@keyframes stPulse{0%{box-shadow:0 0 5px rgba(0,255,100,0.1)}100%{box-shadow:0 0 12px rgba(0,255,100,0.3)}}
.tc-status.st-closed{background:rgba(224,224,255,0.05);color:rgba(224,224,255,0.3);border:1px solid rgba(224,224,255,0.08)}

.tc-btn{
  font-family:'Orbitron',monospace;font-size:0.65rem;font-weight:700;
  padding:8px 16px;border-radius:6px;cursor:pointer;
  text-transform:uppercase;letter-spacing:1.5px;transition:all 0.3s;
  border:1px solid;min-width:90px;
}
.tc-btn.btn-activate{border-color:rgba(0,255,100,0.4);background:rgba(0,255,100,0.1);color:var(--green)}
.tc-btn.btn-activate:hover:not(:disabled){background:rgba(0,255,100,0.2);box-shadow:0 0 15px rgba(0,255,100,0.2)}
.tc-btn.btn-deactivate{border-color:rgba(255,0,80,0.3);background:rgba(255,0,80,0.08);color:var(--magenta)}
.tc-btn.btn-deactivate:hover:not(:disabled){background:rgba(255,0,80,0.18);box-shadow:0 0 15px rgba(255,0,80,0.2)}
.tc-btn:disabled,.btn-action:disabled{opacity:0.4;cursor:not-allowed;pointer-events:none}
.panel-locked{opacity:0.85;pointer-events:none}

/* ─── ACTIONS ─── */
.btn-action{
  font-family:'Orbitron',monospace;font-size:0.8rem;font-weight:700;
  padding:14px 28px;border-radius:10px;cursor:pointer;
  text-transform:uppercase;letter-spacing:2px;transition:all 0.3s;
  display:inline-block;margin:8px 8px 8px 0;
}
.btn-winner{border:2px solid var(--gold);background:rgba(255,215,0,0.1);color:var(--gold)}
.btn-winner:hover{background:rgba(255,215,0,0.2);box-shadow:0 0 30px rgba(255,215,0,0.3);transform:scale(1.03)}
.btn-close-all{border:1px solid rgba(224,224,255,0.2);background:rgba(224,224,255,0.05);color:rgba(224,224,255,0.5);font-size:0.7rem}
.btn-close-all:hover{background:rgba(224,224,255,0.1)}
.btn-hide-winner{border:1px solid rgba(224,224,255,0.2);background:rgba(224,224,255,0.05);color:rgba(224,224,255,0.5);font-size:0.7rem}
.btn-hide-winner:hover{background:rgba(224,224,255,0.1)}
.btn-reset{border:1px solid rgba(255,0,80,0.3);background:rgba(255,0,80,0.05);color:var(--magenta);font-size:0.7rem}
.btn-reset:hover{background:rgba(255,0,80,0.15)}

/* ─── SCORES TABLE ─── */
.scores-table{width:100%;border-collapse:collapse}
.scores-table th{
  font-family:'Orbitron',monospace;font-size:0.6rem;font-weight:700;
  color:rgba(224,224,255,0.4);letter-spacing:1.5px;text-transform:uppercase;
  padding:8px 10px;text-align:left;border-bottom:1px solid rgba(0,240,255,0.1);
}
.scores-table td{padding:10px;font-size:0.9rem;border-bottom:1px solid rgba(0,240,255,0.05)}
.scores-table tr:hover td{background:rgba(0,240,255,0.03)}
.td-agent{font-family:'Orbitron',monospace;font-size:0.78rem;font-weight:700;color:var(--cyan)}
.td-score{font-family:'Orbitron',monospace;font-weight:700;color:var(--gold)}

@media(max-width:600px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .team-ctrl{flex-wrap:wrap;gap:10px}
  .tc-btn{width:100%}
  .scores-table th,.scores-table td{padding:6px 6px;font-size:0.8rem}
}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:400;
  padding:12px 24px;background:var(--bg2);border:1px solid var(--glass-border);
  border-radius:10px;font-size:0.9rem;color:var(--cyan);max-width:90vw;text-align:center;
  box-shadow:0 0 30px rgba(0,240,255,0.15);animation:toastIn 0.3s ease-out;
}
.toast.success{border-color:rgba(0,255,100,0.3);color:var(--green)}
.toast.error{border-color:rgba(255,0,80,0.3);color:var(--magenta)}
@keyframes toastIn{0%{transform:translateX(-50%) translateY(20px);opacity:0}100%{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</head>
<body>

<div class="conn-status">
  <div class="conn-dot local" id="connDot"></div>
  <span id="connLabel">LOCAL</span>
  <span id="syncStatus" class="sync-label"></span>
</div>

<div class="container">
  <div class="admin-header">
    <div class="admin-tag">Command Center</div>
    <h1 class="admin-title">AGENT SKILL WAR</h1>
  </div>

  <div id="authScreen">
    <p class="auth-hint" id="authLoading">Loading configuration…</p>
    <div id="authForm" style="display:none">
      <input type="password" id="adminPassInput" placeholder="Enter admin passkey..." autocomplete="off" disabled>
      <button id="authBtn" onclick="authenticate()" disabled>Access</button>
      <p class="auth-hint">Secured via server config</p>
    </div>
  </div>

  <div id="adminPanel">

    <div class="panel">
      <div class="panel-title">LIVE STATS</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statVoters">0</div>
          <div class="stat-label">Total Voters</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statRatings">0</div>
          <div class="stat-label">Total Ratings</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTopScore">0.00</div>
          <div class="stat-label">Top Score</div>
        </div>
        <div class="stat-card">
          <div class="stat-value active-name" id="statActive">None</div>
          <div class="stat-label">Active Team</div>
        </div>
      </div>
    </div>

    <div class="panel" id="votingControlPanel">
      <div class="panel-title">VOTING CONTROL &mdash; One team at a time</div>
      <div id="teamControlList"></div>
      <div style="margin-top:16px">
        <button class="btn-action btn-close-all" id="btnCloseAll" onclick="closeAllVoting()">Close All Voting</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">SCORE BREAKDOWN</div>
      <table class="scores-table">
        <thead>
          <tr><th>Rank</th><th>Agent</th><th>Votes</th><th>Useful</th><th>Usable</th><th>Adopt</th><th>Avg</th></tr>
        </thead>
        <tbody id="scoresBody"></tbody>
      </table>
    </div>

    <div class="panel" id="actionsPanel">
      <div class="panel-title">ACTIONS</div>
      <button class="btn-action btn-reset" id="btnReset" onclick="confirmReset()">Reset All Votes</button>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL = "";
var SUPABASE_KEY = "";
var ADMIN_PASS = "";
var POLL_INTERVAL = 5000;

var TEAMS = [
  {id:"agent-fit",num:1,agent:"Agent-Fit",presenter:"Harshwardhan Patil"},
  {id:"git-skill",num:2,agent:"Git Skill",presenter:"Kedar Kamthe"},
  {id:"commit-pr-autopilot",num:3,agent:"Commit & PR Autopilot",presenter:"Jay Gondaliya"},
  {id:"figma-to-code",num:4,agent:"Figma to Code",presenter:"Nikhita More"},
  {id:"ai-sentry",num:5,agent:"AI-Sentry",presenter:"RajVivek Kuraria"},
  {id:"zeroday-sentinel",num:6,agent:"ZeroDay Sentinel",presenter:"Sushant Vishnu Nadavade"}
];
var CRITERIA = ["usefulness","usability","adoption"];

var allVotes = {};
var activeTeam = "";
var revealState = false;
var isPolling = false;
var useLive = false;
var configReady = false;
var configSavePending = false;
var resetPending = false;
var pollQueued = false;
var adminSessionPass = "";
var syncStatusTimer = null;

function supaFetch(path,options){
  var opts=options||{};
  opts.headers=Object.assign({'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},opts.headers||{});
  return fetch(SUPABASE_URL+'/rest/v1'+path,opts).then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error(r.status+': '+t)});
    if(r.status===204)return null;
    return r.text().then(function(t){return t?JSON.parse(t):null});
  });
}

function setSyncStatus(state){
  var el=document.getElementById("syncStatus");
  if(!el)return;
  el.className="sync-label";
  if(syncStatusTimer){clearTimeout(syncStatusTimer);syncStatusTimer=null}
  if(state==="saving"){el.textContent="Saving…";el.classList.add("saving")}
  else if(state==="saved"){el.textContent="Saved";el.classList.add("saved");syncStatusTimer=setTimeout(function(){el.textContent=""},3000)}
  else if(state==="error"){el.textContent="Sync failed";el.classList.add("error")}
  else{el.textContent=""}
}

function controlsLocked(){return configSavePending||resetPending}

function setVotingControlsDisabled(disabled){
  var panel=document.getElementById("votingControlPanel");
  var actions=document.getElementById("actionsPanel");
  if(panel)panel.classList.toggle("panel-locked",disabled);
  if(actions)actions.classList.toggle("panel-locked",disabled);
  ["btnCloseAll","btnReset"].forEach(function(id){
    var b=document.getElementById(id);if(b)b.disabled=disabled;
  });
}

function pollData(){
  if(!useLive)return Promise.resolve();
  if(isPolling){pollQueued=true;return Promise.resolve()}
  isPolling=true;
  return Promise.all([
    supaFetch('/votes?select=*'),
    supaFetch('/config?id=eq.1&select=*')
  ]).then(function(results){
    var rows=results[0]||[];
    var cfgRows=results[1]||[];
    if(!resetPending){
      allVotes={};
      rows.forEach(function(r){
        if(!allVotes[r.team_id])allVotes[r.team_id]={};
        allVotes[r.team_id][r.voter_email]={
          name:r.voter_name,usefulness:r.usefulness,usability:r.usability,adoption:r.adoption,ts:r.created_at
        };
      });
    }
    var cfg=cfgRows[0]||{};
    var dbTeam=cfg.active_team||"";
    var dbReveal=cfg.reveal_winner===true;
    if(!configSavePending){
      activeTeam=dbTeam;
      revealState=dbReveal;
    }
    refreshAll();
  }).catch(function(e){console.warn("Poll failed:",e)}).finally(function(){
    isPolling=false;
    if(pollQueued){pollQueued=false;pollData()}
  });
}

function pollDataQueued(){return pollData()}

function startPolling(){pollData();setInterval(pollData,POLL_INTERVAL)}

function patchConfigDirect(){
  return supaFetch('/config?id=eq.1',{
    method:'PATCH',
    headers:{'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({active_team:activeTeam||null,reveal_winner:revealState})
  });
}

function sendConfig(){
  if(!useLive)return Promise.resolve();
  if(configSavePending)return Promise.resolve();
  configSavePending=true;
  setSyncStatus("saving");
  setVotingControlsDisabled(true);

  var payload={active_team:activeTeam||null,reveal_winner:revealState};
  var apiPromise=fetch("/api/admin-config",{
    method:"POST",
    headers:{"Content-Type":"application/json","X-Admin-Pass":adminSessionPass},
    body:JSON.stringify(payload)
  }).then(function(r){
    if(r.ok)return r.json();
    return r.text().then(function(t){throw new Error(t||r.status)});
  });

  return apiPromise.catch(function(){
    return patchConfigDirect();
  }).then(function(){
    configSavePending=false;
    setSyncStatus("saved");
    setVotingControlsDisabled(false);
    return pollDataQueued();
  }).catch(function(e){
    configSavePending=false;
    setSyncStatus("error");
    setVotingControlsDisabled(false);
    console.warn("Config failed:",e);
    showToast("Config update failed","error");
    return pollDataQueued();
  });
}

function applyConfig(cfg){
  if(cfg.SUPABASE_URL)SUPABASE_URL=cfg.SUPABASE_URL;
  if(cfg.SUPABASE_KEY)SUPABASE_KEY=cfg.SUPABASE_KEY;
  if(cfg.ADMIN_PASS)ADMIN_PASS=cfg.ADMIN_PASS;
  if(cfg.POLL_INTERVAL_ADMIN)POLL_INTERVAL=cfg.POLL_INTERVAL_ADMIN;
}

function setAuthLoading(loading,msg){
  var hint=document.getElementById("authLoading");
  var form=document.getElementById("authForm");
  var input=document.getElementById("adminPassInput");
  var btn=document.getElementById("authBtn");
  if(loading){
    hint.style.display="block";
    hint.className="auth-hint";
    hint.textContent=msg||"Loading configuration…";
    form.style.display="none";
    if(input)input.disabled=true;
    if(btn)btn.disabled=true;
  }else{
    hint.style.display="none";
    form.style.display="block";
    if(input)input.disabled=false;
    if(btn)btn.disabled=false;
    setTimeout(function(){input&&input.focus()},50);
  }
}

function initAdmin(){
  document.getElementById("connDot").className="conn-dot loading";
  document.getElementById("connLabel").textContent="CONFIG";
  setAuthLoading(true);
  fetch("/api/config").then(function(r){
    if(!r.ok)throw new Error("config "+r.status);
    return r.json();
  }).then(function(cfg){
    applyConfig(cfg);
    configReady=true;
    document.getElementById("connDot").className="conn-dot local";
    document.getElementById("connLabel").textContent="READY";
    setAuthLoading(false);
    if(!ADMIN_PASS){
      document.getElementById("authLoading").style.display="block";
      document.getElementById("authForm").style.display="none";
      document.getElementById("authLoading").className="auth-hint error";
      document.getElementById("authLoading").textContent="Server config missing ADMIN_PASS.";
    }
  }).catch(function(e){
    configReady=false;
    document.getElementById("connDot").className="conn-dot local";
    document.getElementById("connLabel").textContent="ERROR";
    document.getElementById("authLoading").style.display="block";
    document.getElementById("authForm").style.display="none";
    document.getElementById("authLoading").className="auth-hint error";
    document.getElementById("authLoading").textContent="Could not load /api/config. Refresh the page.";
    console.warn("Config load failed:",e);
  });
}
initAdmin();

function authenticate(){
  if(!configReady){showToast("Still loading config…","error");return}
  adminSessionPass=document.getElementById("adminPassInput").value;
  if(adminSessionPass===ADMIN_PASS){
    document.getElementById("authScreen").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    if(SUPABASE_URL&&SUPABASE_KEY){
      useLive=true;document.getElementById("connDot").className="conn-dot live";
      document.getElementById("connLabel").textContent="LIVE";startPolling();
    } else {
      var s=localStorage.getItem("asw_allVotes");if(s)allVotes=JSON.parse(s);refreshAll();
    }
  } else {showToast("Access denied","error")}
}
document.getElementById("adminPassInput").addEventListener("keydown",function(e){if(e.key==="Enter")authenticate()});

function activateTeam(teamId){
  if(controlsLocked())return;
  activeTeam=teamId;refreshAll();
  sendConfig().then(function(){
    var t=TEAMS.find(function(x){return x.id===teamId});
    showToast("Voting open: "+(t?t.agent:""),"success");
  });
}

function deactivateTeam(){
  if(controlsLocked())return;
  activeTeam="";refreshAll();
  sendConfig().then(function(){showToast("Voting closed","success")});
}

function closeAllVoting(){deactivateTeam()}

function refreshAll(){
  renderTeamControls();refreshStats();
}

function renderTeamControls(){
  var list=document.getElementById("teamControlList");list.innerHTML="";
  var locked=controlsLocked();
  TEAMS.forEach(function(team){
    var isActive=team.id===activeTeam;
    var tv=allVotes[team.id]||{};var count=Object.keys(tv).length;
    var avg=0;
    if(count>0){
      var total=0;Object.keys(tv).forEach(function(v){
        var vote=tv[v];CRITERIA.forEach(function(c){total+=(vote[c]||0)});
      });
      avg=(total/(count*CRITERIA.length)).toFixed(2);
    }

    var row=document.createElement("div");
    row.className="team-ctrl"+(isActive?" is-active":"");
    var btn=document.createElement("button");
    btn.className="tc-btn "+(isActive?"btn-deactivate":"btn-activate");
    btn.textContent=isActive?"Close":"Open";
    btn.disabled=locked;
    btn.onclick=isActive?deactivateTeam:function(){activateTeam(team.id)};

    row.innerHTML=
      '<div class="tc-num">'+team.num+'</div>'+
      '<div class="tc-info">'+
        '<div class="tc-agent">'+team.agent+'</div>'+
        '<div class="tc-presenter">'+team.presenter+'</div>'+
        '<div class="tc-stats"><span>'+count+'</span> votes &bull; Avg: <span>'+avg+'</span></div>'+
      '</div>'+
      '<div class="tc-status '+(isActive?"st-active":"st-closed")+'">'+(isActive?"ACTIVE":"CLOSED")+'</div>';
    row.appendChild(btn);
    list.appendChild(row);
  });
}

function refreshStats(){
  var totalVoters={};var totalRatings=0;var topScore=0;
  var rows=TEAMS.map(function(team){
    var tv=allVotes[team.id]||{};var voters=Object.keys(tv);
    voters.forEach(function(v){totalVoters[v]=1});
    var count=voters.length;totalRatings+=count;
    if(count===0)return{agent:team.agent,avg:0,count:0,u:"0.0",us:"0.0",a:"0.0"};
    var sums={usefulness:0,usability:0,adoption:0};
    voters.forEach(function(v){var vote=tv[v];CRITERIA.forEach(function(c){sums[c]+=(vote[c]||0)})});
    var avg=CRITERIA.reduce(function(s,c){return s+sums[c]},0)/(count*CRITERIA.length);
    if(avg>topScore)topScore=avg;
    return{agent:team.agent,avg:parseFloat(avg.toFixed(2)),count:count,
      u:(sums.usefulness/count).toFixed(1),us:(sums.usability/count).toFixed(1),a:(sums.adoption/count).toFixed(1)};
  });
  rows.sort(function(a,b){return b.avg-a.avg});

  document.getElementById("statVoters").textContent=Object.keys(totalVoters).length;
  document.getElementById("statRatings").textContent=totalRatings;
  document.getElementById("statTopScore").textContent=topScore.toFixed(2);
  var at=TEAMS.find(function(x){return x.id===activeTeam});
  document.getElementById("statActive").textContent=at?at.agent:"None";

  var tbody=document.getElementById("scoresBody");tbody.innerHTML="";
  rows.forEach(function(r,i){
    var tr=document.createElement("tr");
    tr.innerHTML="<td>"+(i+1)+"</td>"+'<td class="td-agent">'+r.agent+"</td>"+'<td>'+r.count+"</td>"+
      "<td>"+r.u+"</td><td>"+r.us+"</td><td>"+r.a+"</td>"+'<td class="td-score">'+r.avg.toFixed(2)+"</td>";
    tbody.appendChild(tr);
  });
}

function confirmReset(){
  if(controlsLocked())return;
  if(!confirm("Delete ALL votes? This cannot be undone."))return;
  if(!confirm("Are you absolutely sure?"))return;
  resetPending=true;
  setSyncStatus("saving");
  setVotingControlsDisabled(true);
  allVotes={};
  refreshAll();

  function finishReset(ok){
    resetPending=false;
    setVotingControlsDisabled(false);
    if(ok){
      setSyncStatus("saved");
      localStorage.removeItem("asw_allVotes");
      showToast("All votes cleared","success");
      return pollDataQueued();
    }
    setSyncStatus("error");
    showToast("Reset failed","error");
    return pollDataQueued();
  }

  if(!useLive){
    localStorage.removeItem("asw_allVotes");
    finishReset(true);
    return;
  }

  fetch("/api/admin-reset",{
    method:"POST",
    headers:{"Content-Type":"application/json","X-Admin-Pass":adminSessionPass}
  }).then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error(t)});
    return finishReset(true);
  }).catch(function(){
    return supaFetch('/votes?id=gt.0',{method:'DELETE'})
      .then(function(){return finishReset(true)})
      .catch(function(){return finishReset(false)});
  });
}

function showToast(msg,type){
  var ex=document.querySelector(".toast");if(ex)ex.remove();
  var t=document.createElement("div");t.className="toast"+(type?" "+type:"");t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity="0";t.style.transition="opacity 0.3s";setTimeout(function(){t.remove()},300)},2500);
}
</script>
